<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" width="300" height="420" font-family="Arial, sans-serif">
  <!-- Obsidian Style Preview — Deep Dark Grid Glow -->

  <defs>
    <radialGradient id="oGlow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" style="stop-color:#004165;stop-opacity:0.5"/>
      <stop offset="60%" style="stop-color:#772432;stop-opacity:0.1"/>
      <stop offset="100%" style="stop-color:#080808;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="oCardBorder1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004165;stop-opacity:0.7"/>
      <stop offset="100%" style="stop-color:#772432;stop-opacity:0.4"/>
    </linearGradient>
    <linearGradient id="oTitleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
    <linearGradient id="oH1Grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#60a5fa"/>
      <stop offset="50%" style="stop-color:#004165"/>
      <stop offset="100%" style="stop-color:#93c5fd"/>
    </linearGradient>
  </defs>

  <!-- Pure black background -->
  <rect width="300" height="420" fill="#080808" rx="6"/>

  <!-- Grid texture lines (hero area) -->
  <g opacity="0.18" stroke="#004165" stroke-width="0.5">
    <line x1="0" y1="10" x2="300" y2="10"/>
    <line x1="0" y1="50" x2="300" y2="50"/>
    <line x1="0" y1="90" x2="300" y2="90"/>
    <line x1="0" y1="130" x2="300" y2="130"/>
    <line x1="10" y1="0" x2="10" y2="135"/>
    <line x1="50" y1="0" x2="50" y2="135"/>
    <line x1="90" y1="0" x2="90" y2="135"/>
    <line x1="130" y1="0" x2="130" y2="135"/>
    <line x1="170" y1="0" x2="170" y2="135"/>
    <line x1="210" y1="0" x2="210" y2="135"/>
    <line x1="250" y1="0" x2="250" y2="135"/>
    <line x1="290" y1="0" x2="290" y2="135"/>
  </g>
  <!-- Grid fade mask -->
  <rect x="0" y="0" width="300" height="135" fill="url(#oGlow)"/>

  <!-- Logo with blue glow -->
  <circle cx="150" cy="24" r="14" fill="rgba(0,65,101,0.2)" stroke="rgba(96,165,250,0.3)" stroke-width="0.5"/>
  <text x="150" y="29" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">TM</text>

  <!-- Eyebrow pill -->
  <rect x="80" y="41" width="140" height="11" fill="none" stroke="rgba(226,232,240,0.12)" stroke-width="0.5" rx="5.5"/>
  <text x="150" y="50" text-anchor="middle" fill="rgba(226,232,240,0.5)" font-size="5.5" font-weight="bold" letter-spacing="1">TOASTMASTERS INT'L • CLUB #4039</text>

  <!-- H1 white line -->
  <text x="150" y="67" text-anchor="middle" fill="white" font-size="8.5" font-weight="bold" letter-spacing="0.5">ENTHUSIASTIC EMBARKERS</text>
  <!-- Gradient text line (simulated with blue) -->
  <text x="150" y="78" text-anchor="middle" fill="#60a5fa" font-size="7.5" font-weight="bold" letter-spacing="0.5">TOASTMASTERS CLUB #4039</text>

  <text x="150" y="89" text-anchor="middle" fill="rgba(226,232,240,0.45)" font-size="5.8">"We help you become a BETTER speaker!"</text>

  <!-- Shimmer button (represented as gradient border box) -->
  <rect x="92" y="95" width="116" height="20" fill="none" stroke="url(#oCardBorder1)" stroke-width="1.5" rx="4"/>
  <rect x="94" y="97" width="112" height="16" fill="#080808" rx="3"/>
  <text x="150" y="109" text-anchor="middle" fill="#e2e8f0" font-size="6" font-weight="bold" letter-spacing="0.8">VISIT US AS A GUEST</text>

  <!-- Header photo -->
  <rect x="0" y="118" width="300" height="44" fill="#111" opacity="0.9"/>
  <rect x="0" y="155" width="300" height="7" fill="url(#oGlow)" opacity="0.5"/>
  <text x="150" y="143" text-anchor="middle" fill="#1e3a52" font-size="8">[ Header Photo ]</text>

  <!-- Intro -->
  <rect x="0" y="162" width="300" height="50" fill="#080808"/>
  <rect x="0" y="212" width="300" height="0.5" fill="rgba(255,255,255,0.05)"/>
  <text x="150" y="179" text-anchor="middle" fill="#93c5fd" font-size="8" font-weight="bold">Welcome to Enthusiastic Embarkers!</text>
  <rect x="30" y="185" width="240" height="3" fill="rgba(255,255,255,0.1)" rx="1.5"/>
  <rect x="40" y="192" width="220" height="3" fill="rgba(255,255,255,0.1)" rx="1.5"/>
  <rect x="50" y="199" width="200" height="3" fill="rgba(255,255,255,0.1)" rx="1.5"/>

  <!-- Meeting cards — gradient border style -->
  <rect x="0" y="212" width="300" height="82" fill="#080808"/>
  <text x="150" y="227" text-anchor="middle" fill="#e2e8f0" font-size="7.5" font-weight="bold">Join Us at Our Next Meeting</text>

  <!-- 4 gradient-border cards -->
  <!-- Card 1 -->
  <rect x="8" y="233" width="62" height="52" fill="url(#oCardBorder1)" rx="5"/>
  <rect x="9" y="234" width="60" height="50" fill="#0f0f0f" rx="4"/>
  <text x="39" y="245" text-anchor="middle" fill="#60a5fa" font-size="4.8" font-weight="bold" letter-spacing="1">WHEN</text>
  <text x="39" y="257" text-anchor="middle" fill="#e2e8f0" font-size="6">Every</text>
  <text x="39" y="267" text-anchor="middle" fill="#e2e8f0" font-size="6">Monday</text>

  <!-- Card 2 -->
  <rect x="78" y="233" width="62" height="52" fill="url(#oCardBorder1)" rx="5"/>
  <rect x="79" y="234" width="60" height="50" fill="#0f0f0f" rx="4"/>
  <text x="109" y="245" text-anchor="middle" fill="#60a5fa" font-size="4.8" font-weight="bold" letter-spacing="1">TIME</text>
  <text x="109" y="257" text-anchor="middle" fill="#e2e8f0" font-size="6">7:00 PM</text>
  <text x="109" y="267" text-anchor="middle" fill="#e2e8f0" font-size="6">8:30 PM PT</text>

  <!-- Card 3 -->
  <rect x="148" y="233" width="62" height="52" fill="url(#oCardBorder1)" rx="5"/>
  <rect x="149" y="234" width="60" height="50" fill="#0f0f0f" rx="4"/>
  <text x="179" y="245" text-anchor="middle" fill="#60a5fa" font-size="4.8" font-weight="bold" letter-spacing="1">IN-PERSON</text>
  <rect x="156" y="248" width="46" height="9" fill="rgba(0,65,101,0.6)" rx="4.5"/>
  <text x="179" y="255.5" text-anchor="middle" fill="#F2DF74" font-size="4.2" font-weight="bold">HYBRID</text>
  <text x="179" y="267" text-anchor="middle" fill="#e2e8f0" font-size="5.5">Corona, CA</text>
  <text x="179" y="276" text-anchor="middle" fill="#e2e8f0" font-size="5.5">Post Acute</text>

  <!-- Card 4 -->
  <rect x="218" y="233" width="74" height="52" fill="url(#oCardBorder1)" rx="5"/>
  <rect x="219" y="234" width="72" height="50" fill="#0f0f0f" rx="4"/>
  <text x="255" y="245" text-anchor="middle" fill="#60a5fa" font-size="4.8" font-weight="bold" letter-spacing="1">ZOOM/RSVP</text>
  <text x="255" y="258" text-anchor="middle" fill="#93c5fd" font-size="5.5">Email Sandra</text>
  <text x="255" y="268" text-anchor="middle" fill="rgba(226,232,240,0.35)" font-size="4.8">samelino@</text>
  <text x="255" y="277" text-anchor="middle" fill="rgba(226,232,240,0.35)" font-size="4.8">gmail.com</text>

  <!-- Mid photo -->
  <rect x="0" y="294" width="300" height="36" fill="#0a0a0a"/>
  <text x="150" y="315" text-anchor="middle" fill="#1a3048" font-size="8">[ Club Photo ]</text>
  <rect x="0" y="324" width="300" height="8" fill="rgba(8,8,8,0.88)"/>
  <text x="150" y="330.5" text-anchor="middle" fill="#93c5fd" font-size="5">Our club family — come join us!</text>

  <!-- Why join -->
  <rect x="0" y="332" width="300" height="46" fill="#080808"/>
  <text x="150" y="347" text-anchor="middle" fill="#e2e8f0" font-size="7.5" font-weight="bold">Why Join Enthusiastic Embarkers?</text>
  <rect x="8" y="351" width="130" height="18" fill="rgba(0,65,101,0.1)" rx="2"/>
  <rect x="8" y="351" width="3" height="18" fill="#004165" rx="1"/>
  <rect x="155" y="351" width="137" height="18" fill="rgba(0,65,101,0.1)" rx="2"/>
  <rect x="155" y="351" width="3" height="18" fill="#004165" rx="1"/>

  <!-- CTA -->
  <rect x="0" y="378" width="300" height="42" fill="#080808"/>
  <rect x="0" y="378" width="300" height="0.5" fill="rgba(255,255,255,0.05)"/>
  <text x="150" y="394" text-anchor="middle" fill="#93c5fd" font-size="8" font-weight="bold">Ready to Find Your Voice?</text>
  <!-- Shimmer button again -->
  <rect x="96" y="400" width="108" height="14" fill="none" stroke="url(#oCardBorder1)" stroke-width="1.2" rx="4"/>
  <rect x="97.5" y="401.5" width="105" height="11" fill="#080808" rx="3"/>
  <text x="150" y="411" text-anchor="middle" fill="#e2e8f0" font-size="5.8" font-weight="bold">CONTACT US</text>

  <!-- Disclaimer -->
  <rect x="0" y="412" width="300" height="8" fill="#040404"/>
  <rect x="0" y="412" width="300" height="0.5" fill="rgba(255,255,255,0.04)"/>

  <!-- Label badge -->
  <rect x="8" y="8" width="74" height="16" fill="rgba(96,165,250,0.1)" stroke="rgba(96,165,250,0.3)" stroke-width="0.5" rx="8"/>
  <text x="45" y="20" text-anchor="middle" fill="#93c5fd" font-size="7.5" font-weight="bold">C — OBSIDIAN</text>
</svg>
